<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundal cerc albastru inchis -->
  <circle cx="256" cy="256" r="256" fill="#12203a"/>

  <!-- Litera P mare, alba-galbena, centrata -->
  <text
    x="256" y="340"
    font-family="Arial Black, Arial, sans-serif"
    font-size="300"
    font-weight="900"
    text-anchor="middle"
    fill="#f5c518"
    letter-spacing="-10"
  >P</text>

  <!-- Punct mic galben deasupra (ca "creier" / accent) -->
  <circle cx="330" cy="118" r="28" fill="#f5c518" opacity="0.5"/>
  <circle cx="330" cy="118" r="16" fill="#f5c518"/>
</svg>
