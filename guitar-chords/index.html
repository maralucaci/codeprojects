<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎸 Guitar Chords</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- COVER -->
  <div id="screen-cover">
    <div class="cover-box">
      <h1>🎸</h1>
      <h2>Guitar Chords</h2>
      <p>Află acordurile oricărui cântec</p>
      <button id="btn-start">START</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="screen-app" class="hidden">
    <header>
      <span class="logo">🎸 Guitar Chords</span>
    </header>

    <!-- SEARCH -->
    <div class="search-wrap">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Caută un cântec... ex: Wonderwall" autocomplete="off">
        <button id="btn-search">🔍</button>
      </div>
      <div id="suggestions" class="suggestions hidden"></div>
    </div>

    <!-- SONG VIEW (shown after search) -->
    <div id="song-view" class="hidden">

      <div class="song-title-bar">
        <span id="song-name"></span>
        <span id="song-artist"></span>
      </div>

      <!-- STATIC DIAGRAMS (shown when not playing) -->
      <div id="diagrams-section">
        <div class="diagrams-grid" id="diagrams-grid"></div>
        <div class="lyrics-wrap" id="lyrics-wrap"></div>
      </div>

      <!-- PLAYER VIEW (shown when playing, full top area) -->
      <div id="player-view" class="hidden">
        <div class="player-left">
          <div class="player-label">ACORD CURENT</div>
          <div class="player-chord-name" id="player-chord-name">—</div>
          <canvas id="player-canvas" width="180" height="210"></canvas>
          <div class="player-hint" id="player-hint"></div>
        </div>

        <div class="player-right">
          <div class="player-next-wrap">
            <div class="player-label">URMĂTOR</div>
            <div class="player-next-name" id="player-next-name">—</div>
            <canvas id="player-next-canvas" width="120" height="140"></canvas>
          </div>

          <div class="speed-wrap">
            <div class="speed-label" id="speed-bpm">80 BPM</div>
            <div class="speed-line">
              <button class="speed-btn" id="btn-slower">−</button>
              <input type="range" id="speed-slider" min="40" max="240" value="80">
              <button class="speed-btn" id="btn-faster">+</button>
            </div>
          </div>
        </div>

        <!-- Progress -->
        <div class="progress-wrap">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

    </div>

    <!-- EMPTY STATE -->
    <div id="empty-state">
      <p>🎵 Caută un cântec și află cum să-l cânți la chitară!</p>
    </div>

    <!-- BOTTOM BAR (always visible after search) -->
    <div class="bottom-bar hidden" id="bottom-bar">
      <div class="chord-seq" id="chord-seq"></div>
      <button class="play-btn" id="btn-play">▶ PLAY</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
