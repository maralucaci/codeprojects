<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghicitorile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="board">

    <!-- COPERTĂ -->
    <div id="cover">
      <h1 class="cover-title">Ghicitorile</h1>
      <p class="cover-sub">Joc de ghicit cuvinte in 2 nivele</p>
      <ul class="cover-rules">
        <li>Prima si ultima litera sunt date</li>
        <li>5 vieti globale — nu pierde timpul!</li>
        <li>10 cuvinte corecte = treci la Antonime</li>
      </ul>
      <button id="start-btn" class="btn-start">START</button>
    </div>

    <h1 class="title">Ghicitorile</h1>

    <!-- NIVEL 1: Hangman -->
    <div id="hangman-game">
      <div class="game-area">
        <div class="canvas-wrap">
          <canvas id="hangman" width="220" height="260"></canvas>
        </div>
        <div class="right-panel">
          <div id="hint-box" class="hint-box"></div>
          <div id="word-display" class="word-display"></div>
          <div id="wrong-letters" class="wrong-letters"></div>
          <div id="keyboard" class="keyboard"></div>
          <div id="message" class="message"></div>
          <div class="btn-row">
            <button id="new-game-btn" class="btn-new">Cuvant nou</button>
            <button id="restart-btn" class="btn-restart">Restart</button>
          </div>
        </div>
      </div>
    </div>

    <!-- NIVEL 2: Tabel Antonime -->
    <div id="grid-game" style="display:none">
      <p class="grid-subtitle">Scrie antonimul (opusul) fiecarui cuvant:</p>
      <div id="antonym-grid" class="antonym-grid"></div>
      <div id="grid-message" class="message"></div>
      <div class="btn-row">
        <button id="next-set-btn" class="btn-new" style="display:none">Urmatorul set</button>
        <button id="grid-restart-btn" class="btn-restart">Restart</button>
      </div>
    </div>

    <div id="level-display" class="level-display"></div>
    <div class="lives-bar" id="lives-bar"></div>

    <div class="score-bar">
      <span>Castigate: <strong id="wins">0</strong></span>
      <span>Pierdute: <strong id="losses">0</strong></span>
      <span>Ramase: <strong id="remaining">60</strong></span>
    </div>
  </div>

  <!-- BUTOANE TEST — sterge aceste 2 linii cand nu mai ai nevoie -->
  <button onclick="startLevel2()" style="position:fixed;bottom:10px;right:80px;opacity:0.35;font-size:0.75rem;padding:4px 10px;background:#333;color:#fff;border:none;border-radius:4px;cursor:pointer;z-index:999" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.35">→ Nivel 2</button>
  <button id="btn-back" onclick="testBack(this)" style="position:fixed;bottom:10px;right:10px;opacity:0.35;font-size:0.75rem;padding:4px 10px;background:#555;color:#fff;border:none;border-radius:4px;cursor:pointer;z-index:999" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.35">← Înapoi</button>
  <script>
    var _backClicks = 0;
    function testBack(btn) {
      _backClicks++;
      if (_backClicks === 1) { restartAll(); btn.textContent = "← Copertă"; }
      else { _backClicks = 0; btn.textContent = "← Înapoi"; var c = document.getElementById("cover"); c.style.transition="none"; c.style.opacity="1"; c.classList.remove("fade-out"); c.style.display="flex"; requestAnimationFrame(function(){ c.style.transition=""; }); }
    }
  </script>

  <script src="words.js"></script>
  <script src="game.js"></script>
</body>
</html>
